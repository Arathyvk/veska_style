{% extends "admin_base.html" %}
{% block title %}Add Category{% endblock %}
{% block nav_category %}active{% endblock %}

{% block content %}
<div class="section-header" style="border-radius:var(--radius) var(--radius) 0 0;">
  <h2>Add Category</h2>
  <a href="{% url 'admin_category_list' %}" class="btn-secondary">&#8592; Back to List</a>
</div>

<div class="card" style="border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:28px 32px;">
  <form method="POST" action="{% url 'admin_category_add' %}">
    {% csrf_token %}

    <div class="form-group" style="max-width:420px;">
      <label class="form-label" for="id_name">Category Name</label>
      <input type="text" id="id_name" name="name"
             class="form-control" placeholder="e.g. Daily Wear"
             value="{{ request.POST.name|default:'' }}" autofocus>
    </div>

    <div style="display:flex;gap:10px;margin-top:6px;">
      <button type="submit" class="btn-primary">Submit</button>
      <a href="{% url 'admin_category_list' %}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
