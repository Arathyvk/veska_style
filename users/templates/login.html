<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VESKA – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cormorant Garamond"', 'serif'],
            body: ['Jost', 'sans-serif'],
          },
          colors: {
            cream:   '#faf7f2',
            sand:    '#ede8df',
            stone:   '#b8a99a',
            bark:    '#7a5c4a',
            espresso:'#2e1d13',
            ink:     '#1a1008',
            blush:   '#e8c9b8',
            'err-bg':  '#fdf0ee',
            'err-bdr': '#e07b6a',
            'err-txt': '#8b2e1e',
          },
          keyframes: {
            fadeUp: {
              '0%':   { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shake: {
              '0%,100%': { transform: 'translateX(0)' },
              '15%':     { transform: 'translateX(-6px)' },
              '30%':     { transform: 'translateX(6px)' },
              '45%':     { transform: 'translateX(-4px)' },
              '60%':     { transform: 'translateX(4px)' },
              '75%':     { transform: 'translateX(-2px)' },
            },
          },
          animation: {
            fadeUp: 'fadeUp 0.7s cubic-bezier(.22,.8,.36,1) both',
            shake:  'shake 0.45s cubic-bezier(.36,.07,.19,.97) both',
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Jost', sans-serif; }
    .font-display { font-family: 'Cormorant Garamond', serif; }
    .input-field:focus { outline: none; border-color: #7a5c4a; box-shadow: 0 0 0 3px rgba(122,92,74,0.12); }
    .input-field.error  { border-color: #e07b6a; background-color: #fdf0ee; }
  </style>
</head>

<body class="min-h-screen bg-cream flex items-center justify-center px-4 py-10"
      style="background-image: radial-gradient(ellipse 70% 60% at 80% 10%, rgba(184,169,154,0.22) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 10% 90%, rgba(232,201,184,0.28) 0%, transparent 55%);">

  <div class="w-full max-w-md flex flex-col gap-9 animate-fadeUp">

    <div class="text-center">
      <div class="font-display text-5xl font-light tracking-[0.32em] text-espresso leading-none">VESKA</div>
      <div class="text-[0.62rem] font-body font-normal tracking-[0.28em] uppercase text-stone mt-1.5">Women's Footwear</div>
    </div>

    <div class="bg-white border border-sand rounded-sm px-10 py-11 shadow-[0_2px_32px_rgba(46,29,19,0.07)]">

      <h1 class="font-display text-[1.65rem] font-medium text-espresso tracking-wide">Login</h1>
      <p class="text-[0.76rem] text-stone mt-1 tracking-wide">Login to your account to continue</p>

      <div id="errorBanner"
           class="hidden mt-6 bg-err-bg border border-err-bdr rounded-sm px-4 py-3">
        <div class="flex items-start gap-2.5">
          <svg class="w-4 h-4 mt-0.5 shrink-0" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="9" stroke="#c0392b" stroke-width="1.5"/>
            <path d="M10 5.5v5" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="14" r="0.75" fill="#c0392b"/>
          </svg>
          <div>
            <p id="errTitle" class="text-[0.76rem] font-medium text-err-txt tracking-wide"></p>
            <p id="errMsg"   class="text-[0.72rem] text-err-txt mt-0.5 leading-relaxed tracking-wide"></p>
          </div>
        </div>
      </div>

      <form id="loginForm" novalidate class="mt-7 space-y-5">

        <div>
          <label for="email" class="block text-[0.68rem] font-medium uppercase tracking-[0.14em] text-bark mb-2">Email</label>
          <input
            type="email" id="email" name="email"
            placeholder="hello@example.com" autocomplete="email"
            class="input-field w-full h-[46px] border border-sand rounded-sm bg-cream px-3.5 text-[0.875rem] text-ink placeholder-stone transition-all duration-200"
          />
          <p id="emailHint" class="hidden text-[0.67rem] text-err-txt mt-1.5 tracking-wide"></p>
        </div>

        <div>
          <label for="password" class="block text-[0.68rem] font-medium uppercase tracking-[0.14em] text-bark mb-2">Password</label>
          <div class="relative">
            <input
              type="password" id="password" name="password"
              placeholder="Enter your password" autocomplete="current-password"
              class="input-field w-full h-[46px] border border-sand rounded-sm bg-cream px-3.5 pr-12 text-[0.875rem] text-ink placeholder-stone transition-all duration-200"
            />
            <button type="button" id="eyeBtn" onclick="togglePassword()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-stone hover:text-bark transition-colors text-base leading-none">
              👁
            </button>
          </div>
          <p id="passwordHint" class="hidden text-[0.67rem] text-err-txt mt-1.5 tracking-wide"></p>
        </div>

        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 text-[0.73rem] text-stone cursor-pointer tracking-wide">
            <input type="checkbox" name="remember" class="accent-bark" />
            Remember me
          </label>
          <a href="#" class="text-[0.70rem] text-bark hover:text-espresso transition-colors tracking-wider">Forgot Password?</a>
        </div>

        <button type="submit"
                class="w-full h-12 bg-espresso hover:bg-ink text-cream text-[0.72rem] font-medium uppercase tracking-[0.22em] rounded-sm transition-colors duration-200 active:scale-[0.98]">
          Login
        </button>

        <div class="flex items-center gap-3 text-[0.66rem] uppercase tracking-[0.1em] text-stone">
          <span class="flex-1 h-px bg-sand"></span>
          <span>or continue with</span>
          <span class="flex-1 h-px bg-sand"></span>
        </div>

        <div class="flex justify-center">
          <a href="{% url 'socialaccount_signup' %}?next=/" class="btn-social">

            <a href="/accounts/google/login/" class="btn-social">
            <svg viewBox="0 0 48 48" class="w-[18px] h-[18px]" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.1-6.1C34.46 3.1 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.19l7.13 5.54C12.43 13.55 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.5 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.68c-.55 2.96-2.2 5.46-4.68 7.14l7.18 5.57C43.27 37.42 46.5 31.41 46.5 24.5z"/>
                <path fill="#FBBC05" d="M10.77 28.27A14.52 14.52 0 0 1 9.5 24c0-1.49.26-2.93.72-4.27L3.09 14.2A23.95 23.95 0 0 0 1 24c0 3.87.93 7.53 2.58 10.76l7.19-6.49z"/>
                <path fill="#34A853" d="M24 47c5.5 0 10.12-1.82 13.49-4.94l-7.18-5.57C28.54 38.25 26.38 39 24 39c-6.26 0-11.57-4.05-13.23-9.73l-7.19 6.49C7.07 43.52 14.82 47 24 47z"/>
            </svg>
            Google
            </a>
        </div>

        <p class="text-center text-[0.73rem] text-stone tracking-wide">
          Don't have an account?
          <a href="#" class="text-bark hover:text-espresso font-medium transition-colors">Sign Up</a>
        </p>

      </form>
    </div>
  </div>

  <script>
    const DEMO_EMAIL    = 'user@veska.com';
    const DEMO_PASSWORD = 'Veska@2024';

    const form        = document.getElementById('loginForm');
    const emailInput  = document.getElementById('email');
    const passInput   = document.getElementById('password');
    const emailHint   = document.getElementById('emailHint');
    const passHint    = document.getElementById('passwordHint');
    const banner      = document.getElementById('errorBanner');
    const errTitle    = document.getElementById('errTitle');
    const errMsg      = document.getElementById('errMsg');

    function clearErrors() {
      [emailInput, passInput].forEach(el => el.classList.remove('error'));
      [emailHint, passHint].forEach(el => { el.textContent = ''; el.classList.add('hidden'); });
      banner.classList.add('hidden');
      banner.classList.remove('animate-shake');
    }

    function showBanner(title, msg) {
      errTitle.textContent = title;
      errMsg.textContent   = msg;
      banner.classList.remove('hidden');
      banner.classList.remove('animate-shake');
      void banner.offsetWidth;
      banner.classList.add('animate-shake');
      banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showFieldError(input, hint, msg) {
      input.classList.add('error');
      hint.textContent = msg;
      hint.classList.remove('hidden');
    }

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      clearErrors();

      const emailVal = emailInput.value.trim();
      const passVal  = passInput.value;
      let hasError   = false;

      if (!emailVal) {
        showFieldError(emailInput, emailHint, 'Please enter your email address.');
        hasError = true;
      } else if (!isValidEmail(emailVal)) {
        showFieldError(emailInput, emailHint, 'Please enter a valid email address (e.g. hello@example.com).');
        hasError = true;
      }

      if (!passVal) {
        showFieldError(passInput, passHint, 'Please enter your password.');
        hasError = true;
      }

      if (hasError) return;

      const emailMatch = emailVal.toLowerCase() === DEMO_EMAIL.toLowerCase();
      const passMatch  = passVal === DEMO_PASSWORD;

      if (!emailMatch && !passMatch) {
        showFieldError(emailInput, emailHint, 'No account found with this email address.');
        showFieldError(passInput,  passHint,  'Password is also incorrect.');
        showBanner(
          'Email and password do not match',
          "We couldn't find an account matching those details. Please check both fields, or sign up for a new account."
        );
      } else if (!emailMatch) {
        showFieldError(emailInput, emailHint, 'No account found with this email address.');
        showBanner(
          'Email address not recognised',
          `We couldn't find a VESKA account registered to "${emailVal}". Please check the spelling or sign up.`
        );
      } else if (!passMatch) {
        showFieldError(passInput, passHint, 'The password you entered is incorrect.');
        showBanner(
        'Incorrect password',
        `The password doesn't match this account. Please try again or use "Forgot Password?" to reset it.`
);
      } else {
        alert('Login successful! Redirecting…');
      }
    });

    emailInput.addEventListener('input', () => {
      emailInput.classList.remove('error');
      emailHint.classList.add('hidden');
      banner.classList.add('hidden');
    });
    passInput.addEventListener('input', () => {
      passInput.classList.remove('error');
      passHint.classList.add('hidden');
      banner.classList.add('hidden');
    });

    function togglePassword() {
      const i = document.getElementById('password');
      const b = document.getElementById('eyeBtn');
      if (i.type === 'password') { i.type = 'text';     b.textContent = '🙈'; }
      else                       { i.type = 'password'; b.textContent = '👁'; }
    }
  </script>
</body>
</html>
