{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VESKA – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --sand: #ede8df;
      --stone: #b8a99a;
      --bark: #7a5c4a;
      --espresso: #2e1d13;
      --ink: #1a1008;
      --error-bg: #fdf0ee;
      --error-border: #e07b6a;
      --error-text: #8b2e1e;
    }

    html, body {
      height: 100%;
      background-color: var(--cream);
      font-family: 'Jost', sans-serif;
    }

    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 60% at 80% 10%, rgba(184,169,154,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(232,201,184,0.28) 0%, transparent 55%);
      padding: 24px;
    }

    .login-shell {
      display: flex; width: 100%; max-width: 420px;
      flex-direction: column; gap: 36px;
      animation: fadeUp 0.7s cubic-bezier(.22,.8,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 300;
      letter-spacing: 0.32em; color: var(--espresso); line-height: 1;
    }
    .brand-tagline {
      font-size: 0.65rem; letter-spacing: 0.3em;
      color: var(--stone); text-transform: uppercase; margin-top: 6px;
    }

    .card {
      background: #fff; border: 1px solid var(--sand); border-radius: 4px;
      padding: 44px 40px 40px;
      box-shadow: 0 2px 32px rgba(46,29,19,0.07);
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 500;
      color: var(--espresso); letter-spacing: 0.04em;
    }
    .card-subtitle { font-size: 0.78rem; color: var(--stone); margin-top: 4px; }

    .msg { margin-top: 16px; padding: 11px 14px; border-radius: 3px; font-size: 0.76rem; }
    .msg-error   { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .msg-success { background: #f0fdf4; border: 1px solid #4ade80; color: #166534; }

    form { margin-top: 28px; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--bark); margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; height: 46px;
      border: 1px solid var(--sand); border-radius: 3px;
      padding: 0 14px;
      font-family: 'Jost', sans-serif; font-size: 0.88rem;
      color: var(--ink); background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-group input::placeholder { color: var(--stone); }
    .form-group input:focus {
      border-color: var(--bark);
      box-shadow: 0 0 0 3px rgba(122,92,74,0.1);
      background: #fff;
    }
    .form-group input.field-error {
      border-color: var(--error-border);
      background: var(--error-bg);
    }

    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 46px; }
    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: var(--stone); padding: 0; transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--bark); }

    .field-hint {
      font-size: 0.68rem; color: var(--error-text);
      margin-top: 5px; display: none;
    }
    .field-hint.visible { display: block; }

    .form-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .remember {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.75rem; color: var(--stone); cursor: pointer;
    }
    .remember input[type="checkbox"] { accent-color: var(--bark); }
    .forgot {
      font-size: 0.72rem; color: var(--bark);
      text-decoration: none; transition: color 0.2s;
    }
    .forgot:hover { color: var(--espresso); }

    .btn-login {
      width: 100%; height: 48px;
      background: var(--espresso); color: var(--cream);
      border: none; border-radius: 3px;
      font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .btn-login:hover  { background: var(--ink); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0; color: var(--stone);
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--sand);
    }

    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; height: 46px;
      border: 1px solid var(--sand); border-radius: 3px;
      background: #fff; color: var(--espresso);
      font-family: 'Jost', sans-serif; font-size: 0.78rem;
      text-decoration: none; cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover {
      border-color: var(--stone); background: var(--cream);
      box-shadow: 0 1px 8px rgba(46,29,19,0.06);
    }
    .google-icon { width: 17px; height: 17px; flex-shrink: 0; }

    .bottom-link {
      text-align: center; margin-top: 24px;
      font-size: 0.75rem; color: var(--stone);
    }
    .bottom-link a {
      color: var(--bark); text-decoration: none;
      font-weight: 500; transition: color 0.2s;
    }
    .bottom-link a:hover { color: var(--espresso); }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
    }
  </style>
</head>
<body>

<div class="login-shell">

  <div class="brand">
    <div class="brand-name">VESKA</div>
    <div class="brand-tagline">Women's Footwear</div>
  </div>

  <div class="card">
    <div class="card-title">Login</div>
    <div class="card-subtitle">Login to your account to continue</div>

    {% for msg in messages %}
      <div class="msg {% if msg.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
        {{ msg }}
      </div>
    {% endfor %}

    <form id="loginForm" method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email" id="email" name="email"
          placeholder="hello@example.com"
          autocomplete="email"
          value="{{ request.POST.email|default:'' }}"
        >
        <div class="field-hint" id="emailHint"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password" id="password" name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <button type="button" class="toggle-pass" id="eyeBtn">&#128065;</button>
        </div>
        <div class="field-hint" id="passwordHint"></div>
      </div>

      <div class="form-row">
        <label class="remember">
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="{% url 'forgot_password' %}" class="forgot">Forgot Password?</a>
      </div>

      <button class="btn-login" type="submit" id="loginBtn">Login</button>

      <div class="divider"><span>or continue with</span></div>

      <a href="{% provider_login_url 'google' %}" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </a>

      <div class="bottom-link">Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></div>

    </form>
  </div>
</div>

<script>
  const emailInput = document.getElementById('email');
  const passInput  = document.getElementById('password');
  const emailHint  = document.getElementById('emailHint');
  const passHint   = document.getElementById('passwordHint');
  const form       = document.getElementById('loginForm');
  const loginBtn   = document.getElementById('loginBtn');

  
  form.addEventListener('submit', function(e) {
    let valid = true;

    emailInput.classList.remove('field-error');
    passInput.classList.remove('field-error');
    emailHint.classList.remove('visible');
    passHint.classList.remove('visible');

    const emailVal = emailInput.value.trim();
    const passVal  = passInput.value;

    if (!emailVal) {
      emailInput.classList.add('field-error');
      emailHint.textContent = 'Please enter your email address.';
      emailHint.classList.add('visible');
      valid = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
      emailInput.classList.add('field-error');
      emailHint.textContent = 'Please enter a valid email (e.g. hello@example.com).';
      emailHint.classList.add('visible');
      valid = false;
    }

    if (!passVal) {
      passInput.classList.add('field-error');
      passHint.textContent = 'Please enter your password.';
      passHint.classList.add('visible');
      valid = false;
    }

    if (!valid) {
      e.preventDefault(); 
      return;
    }

    loginBtn.disabled    = true;
    loginBtn.textContent = 'Logging in…';
  });

  document.getElementById('eyeBtn').addEventListener('click', () => {
    const i = passInput;
    const b = document.getElementById('eyeBtn');
    if (i.type === 'password') { i.type = 'text';     b.textContent = '🙈'; }
    else                       { i.type = 'password'; b.textContent = '👁'; }
  });

  emailInput.addEventListener('input', () => {
    emailInput.classList.remove('field-error');
    emailHint.classList.remove('visible');
  });
  passInput.addEventListener('input', () => {
    passInput.classList.remove('field-error');
    passHint.classList.remove('visible');
  });
</script>

</body>
</html>
