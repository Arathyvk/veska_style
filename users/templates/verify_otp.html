{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VESKA – Verify OTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #faf7f2;
      --sand:     #ede8df;
      --stone:    #b8a99a;
      --bark:     #7a5c4a;
      --espresso: #2e1d13;
      --ink:      #1a1008;
    }

    html, body { height: 100%; background-color: var(--cream); font-family: 'Jost', sans-serif; }

    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 60% at 80% 10%, rgba(184,169,154,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(232,201,184,0.28) 0%, transparent 55%);
      padding: 24px;
    }

    .processing-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: rgba(250, 247, 242, 0.92);
      backdrop-filter: blur(6px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: fadeIn 0.25s ease both;
    }
    .processing-overlay.active { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .spinner {
      width: 44px; height: 44px;
      border: 2px solid var(--sand);
      border-top-color: var(--espresso);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .processing-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 400;
      color: var(--espresso); letter-spacing: 0.1em;
    }
    .processing-sub {
      font-size: 0.72rem; color: var(--stone);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    .shell {
      display: flex; width: 100%; max-width: 420px;
      flex-direction: column; align-items: center; gap: 32px;
      animation: fadeUp 0.7s cubic-bezier(.22,.8,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; width: 100%; }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 300;
      letter-spacing: 0.32em; color: var(--espresso); line-height: 1;
    }
    .brand-tagline {
      font-size: 0.65rem; letter-spacing: 0.3em;
      color: var(--stone); text-transform: uppercase; margin-top: 6px;
    }

    .card {
      width: 100%; background: #fff;
      border: 1px solid var(--sand); border-radius: 4px;
      padding: 44px 40px 40px;
      box-shadow: 0 2px 32px rgba(46,29,19,0.07);
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 500;
      color: var(--espresso); letter-spacing: 0.04em;
    }
    .card-subtitle { font-size: 0.78rem; color: var(--stone); margin-top: 4px; letter-spacing: 0.03em; }
    .email-sent { font-size: 0.78rem; color: var(--bark); font-weight: 500; margin-top: 2px; }

    .msg { margin-top: 14px; padding: 10px 14px; border-radius: 3px; font-size: 0.78rem; }
    .msg-error { background: #fdf0ee; border: 1px solid #e07b6a; color: #8b2e1e; }
    .msg-success { background: #f0fdf4; border: 1px solid #4ade80; color: #166534; }

    .otp-label {
      display: block;
      font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--bark); margin: 28px 0 14px;
    }

    .otp-inputs { display: flex; justify-content: center; gap: 14px; margin-bottom: 20px; }

    .otp-input {
      width: 60px; height: 64px;
      font-size: 1.8rem; font-weight: 600;
      font-family: 'Cormorant Garamond', serif;
      text-align: center;
      background: #faf7f2; color: #2e1d13;
      border: 1.5px solid #ede8df; border-radius: 4px;
      outline: none; caret-color: transparent;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .otp-input:focus { border-color: #7a5c4a; box-shadow: 0 0 0 3px rgba(122,92,74,0.12); background: #fff; }
    .otp-input.filled { border-color: #7a5c4a; background: #fff; }

    .timer-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.75rem; color: var(--stone); margin-bottom: 20px;
    }
    .timer { font-weight: 600; color: var(--bark); font-variant-numeric: tabular-nums; }
    .timer.expired { color: #b91c1c; }

    .resend-btn {
      background: none; border: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem; font-weight: 500;
      color: var(--bark); cursor: pointer;
      text-decoration: underline; padding: 0;
      opacity: 0.4; pointer-events: none;
      transition: opacity 0.2s, color 0.2s;
    }
    .resend-btn.active { opacity: 1; pointer-events: auto; }
    .resend-btn.active:hover { color: var(--espresso); }

    .btn-submit {
      width: 100%; height: 48px;
      background: var(--espresso); color: var(--cream);
      border: none; border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-submit:hover  { background: var(--ink); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    .bottom-link {
      text-align: center; margin-top: 24px;
      font-size: 0.75rem; color: var(--stone);
    }
    .bottom-link a {
      color: var(--bark); text-decoration: none;
      font-weight: 500; transition: color 0.2s;
    }
    .bottom-link a:hover { color: var(--espresso); }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .brand-name { font-size: 2.2rem; }
      .otp-input { width: 52px; height: 56px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-text">Verifying your code…</div>
  <div class="processing-sub">Please wait a moment</div>
</div>

<div class="shell">

  <div class="brand">
    <div class="brand-name">VESKA</div>
    <div class="brand-tagline">Women's Footwear</div>
  </div>

  <div class="card">
    <div class="card-title">Verify Your Email</div>
    <div class="card-subtitle">We've sent a 4-digit code to</div>
    <div class="email-sent">{{ email }}</div>

    {% for msg in messages %}
      <div class="msg {% if msg.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">{{ msg }}</div>
    {% endfor %}

    <form id="otpForm" method="POST" action="{% url 'verify_signup_otp' %}">
      {% csrf_token %}
      <input type="hidden" name="otp" id="otpHidden">

      <label class="otp-label">Enter OTP</label>

      <div class="otp-inputs">
        <input class="otp-input" id="b1" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
        <input class="otp-input" id="b2" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-input" id="b3" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-input" id="b4" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>

      <div class="timer-row">
      <span><span class="timer" id="timer">10:00</span></span>
      <button type="button" class="resend-btn" id="resendBtn">Resend OTP</button>
    </div>

      <button class="btn-submit" type="submit" id="submitBtn">Verify</button>
    </form>

    <div class="bottom-link">
      <a href="{% url 'signup' %}">← Back to Sign Up</a>
    </div>
  </div>
</div>

<script>
  const boxes      = document.querySelectorAll('.otp-input');
  const hidden     = document.getElementById('otpHidden');
  const form       = document.getElementById('otpForm');
  const timerEl    = document.getElementById('timer');
  const resendBtn  = document.getElementById('resendBtn');
  const submitBtn  = document.getElementById('submitBtn');
  const overlay    = document.getElementById('processingOverlay');

  function getCookie(name) {
    let value = null;
    document.cookie.split(';').forEach(c => {
      c = c.trim();
      if (c.startsWith(name + '=')) value = decodeURIComponent(c.slice(name.length + 1));
    });
    return value;
  }

  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/[^0-9]/g, '');
      box.classList.toggle('filled', !!box.value);
      if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
      updateHidden();
    });

    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        boxes[i - 1].value = '';
        boxes[i - 1].classList.remove('filled');
        boxes[i - 1].focus();
        updateHidden();
      }
    });

    box.addEventListener('paste', e => {
      e.preventDefault();
      const text = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
      [...text].slice(0, 4).forEach((ch, j) => {
        if (boxes[j]) { boxes[j].value = ch; boxes[j].classList.add('filled'); }
      });
      boxes[Math.min(text.length, 3)].focus();
      updateHidden();
    });
  });

  function updateHidden() {
    hidden.value = [...boxes].map(b => b.value).join('');
  }

  form.addEventListener('submit', e => {
    if (getRemaining() <= 0) {
      e.preventDefault();
      alert('OTP has expired. Please click Resend OTP.');
      return;
    }
    if (hidden.value.length < 4) {
      e.preventDefault();
      alert('Please enter the complete 4-digit OTP.');
      return;
    }
    overlay.classList.add('active');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Verifying…';
  });

  const KEY      = 'veska_otp_expiry';
  const DURATION = 50 * 1000; 


if (!sessionStorage.getItem(KEY)) {
  sessionStorage.setItem(KEY, Date.now() + DURATION);
}
function getRemaining() {
  return Math.max(0, Math.floor((parseInt(sessionStorage.getItem(KEY)) - Date.now()) / 1000));
}

function formatTime(s) {
  return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

function expireTimer() {
  timerEl.textContent = 'Expired';
  timerEl.classList.add('expired');
  submitBtn.disabled = true;
  resendBtn.classList.add('active');
  sessionStorage.removeItem(KEY);
}

let ticker;
function startTimer() {
  clearInterval(ticker);
  ticker = setInterval(() => {
    const remaining = getRemaining();
    timerEl.textContent = formatTime(remaining);
    if (remaining <= 0) { clearInterval(ticker); expireTimer(); }
  }, 500);
}

timerEl.textContent = formatTime(10 * 60);
submitBtn.disabled = false;
startTimer();


(function initTimer() {
    const remaining = getRemaining();
    if (remaining <= 0) { expireTimer(); }
    else { timerEl.textContent = formatTime(remaining); startTimer(); }
  })();

  resendBtn.addEventListener('click', () => {
    if (!resendBtn.classList.contains('active')) return;

    resendBtn.textContent = 'Sending…';
    resendBtn.classList.remove('active');

    fetch("{% url 'resend_otp' %}", {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: 'purpose=signup'
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        sessionStorage.setItem(KEY, Date.now() + DURATION);
        timerEl.classList.remove('expired');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Verify';
        boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
        boxes[0].focus();
        updateHidden();
        startTimer();
      } else {
        alert(data.message || 'Failed to resend OTP. Please try again.');
        resendBtn.classList.add('active');
      }
      resendBtn.textContent = 'Resend OTP';
    })
    .catch(() => {
      alert('Network error. Please try again.');
      resendBtn.textContent = 'Resend OTP';
      resendBtn.classList.add('active');
    });
  });

  boxes[0].focus();
</script>
</body>
</html>
