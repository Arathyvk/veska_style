{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VESKA – Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #faf7f2;
      --sand:         #ede8df;
      --stone:        #b8a99a;
      --bark:         #7a5c4a;
      --espresso:     #2e1d13;
      --ink:          #1a1008;
      --error-bg:     #fdf0ee;
      --error-border: #e07b6a;
      --error-text:   #8b2e1e;
    }

    html, body {
      height: 100%;
      background-color: var(--cream);
      font-family: 'Jost', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 60% at 80% 10%, rgba(184,169,154,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(232,201,184,0.28) 0%, transparent 55%);
      padding: 24px;
    }

    .shell {
      display: flex;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeUp 0.7s cubic-bezier(.22,.8,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; width: 100%; }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 300;
      letter-spacing: 0.32em; color: var(--espresso); line-height: 1;
    }
    .brand-tagline {
      font-size: 0.65rem; font-weight: 400;
      letter-spacing: 0.3em; color: var(--stone);
      text-transform: uppercase; margin-top: 6px;
    }

    .card {
      width: 100%; background: #fff;
      border: 1px solid var(--sand); border-radius: 4px;
      padding: 44px 40px 40px;
      box-shadow: 0 2px 32px rgba(46,29,19,0.07);
    }

    .card-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--sand);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 500;
      color: var(--espresso); letter-spacing: 0.04em;
    }
    .card-subtitle {
      font-size: 0.78rem; color: var(--stone);
      margin-top: 4px; letter-spacing: 0.03em;
    }

    /* Error/success messages */
    .msg {
      padding: 10px 14px; border-radius: 3px;
      font-size: 0.78rem; margin-top: 18px;
    }
    .msg-error   { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .msg-success { background: #f0faf4; border: 1px solid #6fba8a; color: #1e6b38; }

    form { margin-top: 28px; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--bark); margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; height: 46px;
      border: 1px solid var(--sand); border-radius: 3px;
      padding: 0 14px;
      font-family: 'Jost', sans-serif; font-size: 0.88rem;
      color: var(--ink); background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-group input::placeholder { color: var(--stone); }
    .form-group input:focus {
      border-color: var(--bark);
      box-shadow: 0 0 0 3px rgba(122,92,74,0.1);
      background: #fff;
    }

    .form-footer {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }
    .form-footer a {
      font-size: 0.72rem; color: var(--stone);
      text-decoration: none; letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .form-footer a:hover { color: var(--bark); }

    .btn-submit {
      width: 100%; height: 48px;
      background: var(--espresso); color: var(--cream);
      border: none; border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-submit:hover  { background: var(--ink); }
    .btn-submit:active { transform: scale(0.98); }

    .bottom-link {
      text-align: center; margin-top: 24px;
      font-size: 0.75rem; color: var(--stone);
      letter-spacing: 0.03em;
    }
    .bottom-link a {
      color: var(--bark); text-decoration: none;
      font-weight: 500; transition: color 0.2s;
    }
    .bottom-link a:hover { color: var(--espresso); }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .brand-name { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<div class="shell">

  <div class="brand">
    <div class="brand-name">VESKA</div>
    <div class="brand-tagline">Women's Footwear</div>
  </div>

  <div class="card">

    <div class="card-icon">
      <svg width="22" height="22" fill="none" stroke="#7a5c4a" stroke-width="1.8" viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
    </div>

    <div class="card-title">Forgot Password</div>
    <div class="card-subtitle">Enter your email to receive a reset OTP</div>

    {% for msg in messages %}
      <div class="msg {% if 'error' in msg.tags %}msg-error{% else %}msg-success{% endif %}">
        {{ msg }}
      </div>
    {% endfor %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          name="email"
          value="{{ request.POST.email|default:'' }}"
          placeholder="hello@example.com"
          required
          autofocus
        >
      </div>

      <div class="form-footer">
        <a href="{% url 'login' %}">Back to Login</a>
      </div>

      <button class="btn-submit" type="submit">Send OTP</button>
    </form>

    <div class="bottom-link">
      Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
    </div>

  </div>
</div>

</body>
</html>
