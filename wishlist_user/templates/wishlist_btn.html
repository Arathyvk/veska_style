{% if size == "large" %}
<button
  class="wl-btn wl-btn-lg {% if product.pk in wishlist_ids %}wl-active{% endif %}"
  id="wl-btn-{{ product.pk }}"
  onclick="toggleWishlist(event, '{{ product.slug }}', '{{ product.pk }}')"
  aria-label="{% if product.pk in wishlist_ids %}Remove from wishlist{% else %}Save to wishlist{% endif %}"
  title="{% if product.pk in wishlist_ids %}Remove from wishlist{% else %}Save to wishlist{% endif %}">
  <svg class="wl-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
  <svg class="wl-icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
  <span class="wl-btn-text">
    {% if product.pk in wishlist_ids %}Saved{% else %}Save{% endif %}
  </span>
</button>

{% else %}
{# ── SMALL variant — for product listing cards ── #}
<button
  class="wl-btn wl-btn-sm {% if product.pk in wishlist_ids %}wl-active{% endif %}"
  id="wl-btn-{{ product.pk }}"
  onclick="toggleWishlist(event, '{{ product.slug }}', '{{ product.pk }}')"
  aria-label="{% if product.pk in wishlist_ids %}Remove from wishlist{% else %}Save to wishlist{% endif %}"
  title="{% if product.pk in wishlist_ids %}Saved{% else %}Save to wishlist{% endif %}">
  <svg class="wl-icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
  <svg class="wl-icon-filled" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
</button>
{% endif %}


<style>
.wl-btn {
  border: none;
  cursor: pointer;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.wl-icon-filled  { display: none  }
.wl-icon-outline { display: block }
.wl-btn.wl-active .wl-icon-filled  { display: block }
.wl-btn.wl-active .wl-icon-outline { display: none  }

.wl-btn-sm {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,.92);
  border: 1px solid rgba(224,217,208,.8);
  color: #b0a699;
  backdrop-filter: blur(4px);
}
.wl-btn-sm svg { width: 15px; height: 15px }
.wl-btn-sm:hover {
  background: #fdf0f0;
  border-color: #b53333;
  color: #b53333;
  transform: scale(1.1);
}
.wl-btn-sm.wl-active {
  background: #fdf0f0;
  border-color: rgba(181,51,51,.3);
  color: #b53333;
}
.wl-btn-sm.wl-active:hover {
  background: #b53333;
  color: #fff;
}

.wl-btn-lg {
  gap: 8px;
  padding: 11px 18px;
  border-radius: 10px;
  background: #faf8f5;
  border: 1.5px solid #e0d9d0;
  color: #7a6f66;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
}
.wl-btn-lg svg { width: 17px; height: 17px }
.wl-btn-lg:hover {
  border-color: #b53333;
  color: #b53333;
  background: #fdf0f0;
}
.wl-btn-lg.wl-active {
  background: #fdf0f0;
  border-color: rgba(181,51,51,.35);
  color: #b53333;
}
.wl-btn-lg.wl-active:hover {
  background: #b53333;
  color: #fff;
}
.wl-btn-lg.wl-active:hover .wl-btn-text::after { content: 'Remove' }
.wl-btn-lg .wl-btn-text { pointer-events: none }

@keyframes heartPop {
  0%   { transform: scale(1)    }
  40%  { transform: scale(1.35) }
  70%  { transform: scale(.9)   }
  100% { transform: scale(1)    }
}
.wl-btn.wl-pop { animation: heartPop .35s ease }
</style>


<script>

function _getCSRF() {
  if (window.CSRF_TOKEN) return window.CSRF_TOKEN;
  const meta = document.querySelector('meta[name="csrf-token"]');
  if (meta) return meta.content;
  const div = document.getElementById('csrf-token');
  if (div) return div.dataset.token;
  return '';
}

async function toggleWishlist(e, slug, productId) {
  e.preventDefault();
  e.stopPropagation();

  const btn = document.getElementById(`wl-btn-${productId}`);
  if (!btn) return;

  const wasActive = btn.classList.contains('wl-active');
  btn.classList.toggle('wl-active');
  btn.classList.add('wl-pop');
  btn.addEventListener('animationend', () => btn.classList.remove('wl-pop'), { once: true });

  const label = btn.querySelector('.wl-btn-text');
  if (label) label.textContent = wasActive ? 'Save' : 'Saved';

  btn.setAttribute('aria-label', wasActive ? 'Save to wishlist' : 'Remove from wishlist');

  try {
    const res  = await fetch(`/wishlist/toggle/${slug}/`, {
      method:  'POST',
      headers: {
        'X-CSRFToken':      _getCSRF(),
        'X-Requested-With': 'XMLHttpRequest',
      },
    });
    const data = await res.json();

    if (!data.ok) {
      btn.classList.toggle('wl-active');
      if (label) label.textContent = wasActive ? 'Saved' : 'Save';
    } else {
      if (typeof showToast === 'function') {
        showToast(data.msg, data.added ? '' : '');
      }
    }
  } catch (err) {
    btn.classList.toggle('wl-active');
    if (label) label.textContent = wasActive ? 'Saved' : 'Save';
    if (typeof showToast === 'function') {
      showToast('Network error. Please try again.', 'toast-error');
    }
  }


document.querySelectorAll(`#wl-btn-${productId}`).forEach(btn => {
  if (data.added) {
    btn.classList.add('wl-active');
  } else {
    btn.classList.remove('wl-active');
  }
});

}
</script>
